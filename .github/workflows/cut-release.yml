name: Cut Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Which part of the semver version to bump"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Compute the new tag but do not commit or push"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  cut:
    name: Bump version & tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Read current version from pubspec.yaml
        id: current
        run: |
          set -euo pipefail
          line=$(grep -E '^version:' apps/mobile/pubspec.yaml | head -1)
          version=$(echo "$line" | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+).*/\1/')
          build=$(echo "$line"   | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+).*/\2/')

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || [[ ! "$build" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to parse version from pubspec.yaml (got '$line')"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build"     >> "$GITHUB_OUTPUT"
          echo "Current: $version+$build"

      - name: Compute next version
        id: next
        run: |
          set -euo pipefail
          IFS='.' read -r MAJ MIN PAT <<< '${{ steps.current.outputs.version }}'
          BUILD='${{ steps.current.outputs.build }}'
          case '${{ inputs.bump_type }}' in
            major) MAJ=$((MAJ + 1)); MIN=0; PAT=0 ;;
            minor) MIN=$((MIN + 1)); PAT=0 ;;
            patch) PAT=$((PAT + 1)) ;;
            *)     echo "::error::Unknown bump_type"; exit 1 ;;
          esac
          NEW_VERSION="$MAJ.$MIN.$PAT"
          NEW_BUILD=$((BUILD + 1))
          TAG="v$NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$NEW_BUILD"     >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "Next:    $NEW_VERSION+$NEW_BUILD ($TAG)"

      - name: Fail if tag already exists
        run: |
          set -euo pipefail
          tag='${{ steps.next.outputs.tag }}'
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "::error::Tag $tag already exists locally"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q .; then
            echo "::error::Tag $tag already exists on origin"
            exit 1
          fi

      - name: Update pubspec.yaml
        run: |
          set -euo pipefail
          new='${{ steps.next.outputs.version }}+${{ steps.next.outputs.build }}'
          # awk avoids the BSD-vs-GNU `sed -i` portability footgun.
          awk -v new="$new" '
            BEGIN { done = 0 }
            /^version:/ && !done { sub(/version:.*/, "version: " new); done = 1 }
            { print }
          ' apps/mobile/pubspec.yaml > apps/mobile/pubspec.yaml.tmp
          mv apps/mobile/pubspec.yaml.tmp apps/mobile/pubspec.yaml
          echo "Updated pubspec.yaml:"
          grep -E '^version:' apps/mobile/pubspec.yaml

      - name: Commit, tag, and push
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          tag='${{ steps.next.outputs.tag }}'
          ver='${{ steps.next.outputs.version }}'

          git add apps/mobile/pubspec.yaml
          git commit -m "chore(release): cut $tag"
          git tag -a "$tag" -m "Release $ver"

          # Push branch first so the tagged commit is reachable.
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
          git push origin "$tag"

      - name: Summary
        run: |
          {
            echo "## Release cut"
            echo ""
            echo "| Field    | Value |"
            echo "| -------- | ----- |"
            echo "| Bump     | \`${{ inputs.bump_type }}\` |"
            echo "| Previous | \`${{ steps.current.outputs.version }}+${{ steps.current.outputs.build }}\` |"
            echo "| New      | \`${{ steps.next.outputs.version }}+${{ steps.next.outputs.build }}\` |"
            echo "| Tag      | \`${{ steps.next.outputs.tag }}\` |"
            echo "| Dry run  | \`${{ inputs.dry_run }}\` |"
            echo ""
            if [[ '${{ inputs.dry_run }}' == 'true' ]]; then
              echo "Dry run only — no commit, no tag pushed."
            else
              echo "Tag pushed. The **Release** workflow will run for \`${{ steps.next.outputs.tag }}\` next."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
