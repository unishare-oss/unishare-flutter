name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: apps/mobile
        run: flutter build web --release

      - name: Archive web build
        run: cd apps/mobile/build/web && zip -r $GITHUB_WORKSPACE/web-release.zip .

      - uses: actions/upload-artifact@v7
        with:
          name: web-release
          path: web-release.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > apps/mobile/android/app/google-services.json

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (debug)
        working-directory: apps/mobile
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: web-release

      - uses: actions/download-artifact@v8
        with:
          name: android-apk

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            web-release.zip
            app-debug.apk
