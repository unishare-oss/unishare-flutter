name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.x"

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  build-web:
    name: Build Web
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: apps/mobile
        run: flutter build web --release --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Archive web build
        run: cd apps/mobile/build/web && zip -r $GITHUB_WORKSPACE/unishare-${{ github.ref_name }}.zip .

      - uses: softprops/action-gh-release@v3
        with:
          files: unishare-${{ github.ref_name }}.zip

  build-android:
    name: Build Android
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > apps/mobile/android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/unishare-release.jks

      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> apps/mobile/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"     >> apps/mobile/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"           >> apps/mobile/android/key.properties
          echo "storeFile=../../unishare-release.jks"        >> apps/mobile/android/key.properties

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Remove WASM modules (not needed for Android)
        working-directory: apps/mobile
        run: dart run pdfrx:remove_wasm_modules

      - name: Build Android APK (release)
        working-directory: apps/mobile
        run: flutter build apk --release --split-per-abi --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Build Android AAB (release)
        working-directory: apps/mobile
        run: flutter build appbundle --release --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Rename artifacts with version
        run: |
          mv apps/mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk unishare-${{ github.ref_name }}.apk
          mv apps/mobile/build/app/outputs/bundle/release/app-release.aab         unishare-${{ github.ref_name }}.aab

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            unishare-${{ github.ref_name }}.apk
            unishare-${{ github.ref_name }}.aab

  build-ios:
    name: Build iOS (unsigned)
    needs: create-release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Write GoogleService-Info.plist
        env:
          GOOGLESERVICE_INFO_PLIST: ${{ secrets.GOOGLESERVICE_INFO_PLIST }}
        run: echo "$GOOGLESERVICE_INFO_PLIST" > apps/mobile/ios/Runner/GoogleService-Info.plist

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Remove WASM modules (not needed for iOS)
        working-directory: apps/mobile
        run: dart run pdfrx:remove_wasm_modules

      - name: Build iOS app (unsigned)
        working-directory: apps/mobile
        run: flutter build ios --release --no-codesign --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r apps/mobile/build/ios/iphoneos/Runner.app Payload/
          zip -r unishare-${{ github.ref_name }}.ipa Payload/
          rm -rf Payload

      - uses: softprops/action-gh-release@v3
        with:
          files: unishare-${{ github.ref_name }}.ipa
