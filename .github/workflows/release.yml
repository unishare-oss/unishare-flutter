name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: apps/mobile
        run: flutter build web --release --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Archive web build
        run: cd apps/mobile/build/web && zip -r $GITHUB_WORKSPACE/web-release.zip .

      - uses: actions/upload-artifact@v7
        with:
          name: web-release
          path: web-release.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > apps/mobile/android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/unishare-release.jks

      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> apps/mobile/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"     >> apps/mobile/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"           >> apps/mobile/android/key.properties
          echo "storeFile=../../unishare-release.jks"        >> apps/mobile/android/key.properties

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Android APK (release)
        working-directory: apps/mobile
        run: flutter build apk --release --split-per-abi --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Build Android AAB (release)
        working-directory: apps/mobile
        run: flutter build appbundle --release --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - uses: actions/upload-artifact@v7
        with:
          name: android-aab
          path: apps/mobile/build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Write GoogleService-Info.plist
        env:
          GOOGLESERVICE_INFO_PLIST: ${{ secrets.GOOGLESERVICE_INFO_PLIST }}
        run: echo "$GOOGLESERVICE_INFO_PLIST" > apps/mobile/ios/Runner/GoogleService-Info.plist

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build iOS IPA (unsigned)
        working-directory: apps/mobile
        run: flutter build ipa --no-codesign --dart-define=WORKER_URL=${{ secrets.WORKER_URL }}

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r apps/mobile/build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -r ios.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: ios.ipa
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-ios]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: web-release

      - uses: actions/download-artifact@v8
        with:
          name: android-apk

      - uses: actions/download-artifact@v8
        with:
          name: android-aab

      - uses: actions/download-artifact@v8
        with:
          name: ios-ipa

      - name: Rename artifacts with version
        run: |
          mv web-release.zip             unishare-${{ github.ref_name }}.zip
          mv app-arm64-v8a-release.apk   unishare-${{ github.ref_name }}.apk
          mv app-release.aab             unishare-${{ github.ref_name }}.aab
          mv ios.ipa                     unishare-${{ github.ref_name }}.ipa

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            unishare-${{ github.ref_name }}.zip
            unishare-${{ github.ref_name }}.apk
            unishare-${{ github.ref_name }}.aab
            unishare-${{ github.ref_name }}.ipa
