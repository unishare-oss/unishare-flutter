name: Firebase App Distribution

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  distribute:
    name: Distribute to Testers
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.x"
          channel: stable
          cache: true

      - name: Write Firebase options
        env:
          FIREBASE_OPTIONS: ${{ secrets.FIREBASE_OPTIONS }}
        run: echo "$FIREBASE_OPTIONS" > apps/mobile/lib/firebase_options.dart

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > apps/mobile/android/app/google-services.json

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run code generation
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Remove WASM modules (not needed for Android)
        working-directory: apps/mobile
        run: dart run pdfrx:remove_wasm_modules

      - name: Build Android APK (debug)
        working-directory: apps/mobile
        run: flutter build apk --debug

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: "Build from ${{ github.sha }}"
