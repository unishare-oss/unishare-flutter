name: Deploy Docs

on:
  push:
    branches: [docs]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install MkDocs Material
        run: pip install -r requirements.txt

      - name: Fetch docs content from main
        run: |
          git fetch origin main
          for dir in tech-specs tech-proposals; do
            if git ls-tree -r --name-only origin/main "$dir/" 2>/dev/null | grep -q .; then
              git checkout origin/main -- "$dir/"
              mkdir -p "docs/$dir"
              cp -r "$dir/." "docs/$dir/"
            fi
          done
          if git ls-tree -r --name-only origin/main docs/decisions/ 2>/dev/null | grep -q .; then
            git checkout origin/main -- docs/decisions/
          fi

      - name: Generate index tables
        run: python3 scripts/gen_indexes.py

      - name: Build MkDocs site
        run: mkdocs build

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
