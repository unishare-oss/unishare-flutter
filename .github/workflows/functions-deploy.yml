name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/functions-deploy.yml"

permissions:
  contents: read

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Run tests
        working-directory: functions
        run: npm test

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write functions runtime config
        working-directory: functions
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: echo "WORKER_URL=$WORKER_URL" > .env.unishare-flutter

      - name: Deploy functions
        run: firebase deploy --only functions --project unishare-flutter --force
