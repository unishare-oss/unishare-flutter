name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the context and motivation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should happen? Include any design ideas or mockups.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Auth
        - Content sharing
        - Search & discovery
        - Profile
        - Design system / UI
        - Offline support
        - Notifications
        - Other
    validations:
      required: true
