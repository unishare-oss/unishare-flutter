name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the context and motivation.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Optional — what you'd like to see, if you have ideas. The architect will write the formal proposal in `tech-proposals/`.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Auth
        - Posts / Feed
        - Requests / Suggestions
        - Profile
        - Notifications
        - Design system / UI
        - Cloud Functions / backend
        - Firestore / data model
        - CI/CD / Release
        - Offline / caching
        - Other
    validations:
      required: true
